<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyVerse</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body>
    <!-- navbar -->
    <nav class="navbar-wrapper">
        <div class="navbar glass">

            <div class="logo">
                <a href="#">
                    <span class="brand">Daily</span>Verse
            </div>

            <div class="nav-links">
                <a href="#movies">Movies</a>
                <a href="#news">Top Headlines</a>
                <a href="#">Lab</a>
            </div>

            <div class="nav-actions">
                <button class="icon-btn">
                    <span class="material-symbols-outlined">search</span>
                </button>

                <button class="icon-btn">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
    </nav>
    <!-- heroSection -->
    <section class="hero">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="assets/gifs/hero.mp4" type="video/mp4">
        </video>

        <div class="hero-content">
            <h1 class="hero-title">
                Stay Informed. Stay Inspired.
            </h1>

            <p class="hero-subtitle">
                Discover the pulse of global news and the art of modern cinema.
            </p>

            <a href="#news" class="hero-btn">Explore the Feed</a>
        </div>
    </section>
    <!-- newssection -->
    <section id="news">

        <div class="news-wrapper">

            <h1>Latest <br>Articles</h1>
        </div>
        <hr>
        <div id="news-container"></div>

    </section>
    <!-- omdb -->
    <section id="movies">
        <div class="movie-wrapper">
            <h1>Top<br>Movies</h1>

            <hr>
            <div id="movie-container" class="movie-grid"></div>
        </div>
    </section>

    <!-- AI Section -->
    <section id="ai">
        <div class="ai-wrapper">
            <h1>AI Tech<br>Facts</h1>
            <hr>
            <div id="ai-container"></div>
        </div>
    </section>

    <script src="js/news.js"></script>
    <script src="js/movies.js"></script>
    <script src="js/index.js"></script>
</body>

</html>
